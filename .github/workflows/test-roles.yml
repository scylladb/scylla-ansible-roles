---
name: Molecule Test for ansible roles
on:
  push:
    paths:
      - 'ansible-scylla-node/**'
      - 'ansible-scylla-monitoring/**'
      - 'ansible-scylla-manager/**'
      - '.github/workflows/*'
  pull_request:
    paths:
      - 'ansible-scylla-node/**'
      - 'ansible-scylla-monitoring/**'
      - 'ansible-scylla-manager/**'
    branches:
      - master
jobs:
  build:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        molecule_distro:
          - debian11
          - debian12
          - ubuntu2204
          - ubuntu2404
          - rockylinux9
          - rockylinux10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
      - name: Set up Python 3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.2 pip-tools
          pip-sync requirements.txt requirements-dev.txt
          ansible-galaxy collection install community.docker
          ansible --version
          molecule --version
      - name: Test with molecule
        run: |
          molecule destroy --scenario-name ${{ matrix.molecule_distro }} && molecule test --scenario-name ${{ matrix.molecule_distro }}
