---

allow_duplicates: yes

galaxy_info:
  role_name: scylla_node
  namespace: scylladb
  author: Dan Yasny, Lubos Kosco
  description: Scylla node role
  company: "ScyllaDB.com"
  license: "license (Apache)"
  min_ansible_version: 2.8.0
  platforms:
  - name: EL
    versions:
    - 7
  - name: Debian
    versions:
    - 8
    - 9
  - name: Ubuntu
    versions:
    - 20.04
    - 16.04
    - 18.04
  - galaxy_tags:
    - scylla
    - scylladb
    - scylla-node
    - cassandra
dependencies:
  - role: ansible-scylla-common
    vars:
      # Default time-out to wait on acquiring an APT lock.
      apt_lock_timeout: 1200
      repo_pattern_list:
        - "scylla*"
      required_ports_open_to:
        scylla: [7000, 7001]
        scylla-monitor: [9180]
    when: not skip_role_deps | default(false)

